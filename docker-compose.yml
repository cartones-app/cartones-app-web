services:
  frontend:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* se bakea en el bundle al build. Lo pasamos como
        # build-arg desde el .env (que el workflow genera leyendo Variables).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: cartones_frontend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    # Sin "ports:" — entra por nginx-proxy en la network externa "proxy".
    networks:
      - proxy
    # Healthcheck con Node.js (la imagen es node:22-alpine — siempre lo tiene).
    # wget --spider falla con redirect 302 de '/' → '/upload'. nc en busybox
    # no quedó claro por qué falla. Esta es la opción más portable y rápida.
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  proxy:
    # Network externa creada por ~/infra-claude/vps (nginx-proxy + cloudflared).
    external: true
