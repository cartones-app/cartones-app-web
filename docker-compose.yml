services:
  frontend:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* se bakea en el bundle al build. Lo pasamos como
        # build-arg desde el .env que el workflow genera leyendo GitHub Variables.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
    container_name: cartones_frontend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # NextAuth runtime secrets (no se bakean — runtime-only).
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET}
      AUTH_KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    networks:
      - proxy
    # Healthcheck con Node.js puro (la imagen es node:22-alpine).
    # wget --spider falla con 302 del root; nc en busybox dio resultados
    # raros. createConnection es la opción más portable.
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  proxy:
    # Network externa creada por ~/infra-claude/vps (nginx-proxy + cloudflared).
    external: true
