name: Deploy frontend to VPS (prod)

# Despliega el frontend Next.js a la VPS personal cuando se pushea a master.
# Mismo runner self-hosted que el backend (cartones-runner, [self-hosted, linux, arm64]).
#
# Topología:
#   Internet → Cloudflare (rgq-cartones.eliasg.uk) → tunnel → nginx-proxy → cartones_frontend:3000
# El frontend (Next) hace fetch al backend SOLO server-side a la URL interna
# (BACKEND_INTERNAL_URL=http://backend:9001, DNS docker en la network "proxy").
# El browser nunca llega directo al backend — habla con Next en same-origin
# vía rewrites /api-proxy/* (ver next.config.ts). Backend no necesita CORS
# para este origin, y puede no publicar puerto público.
#
# Variables y Secrets en GitHub (Settings → Secrets and variables → Actions):
#   Variables:
#     BACKEND_INTERNAL_URL=http://backend:9001  (DNS interno docker)
#     NEXTAUTH_URL=https://rgq-cartones.eliasg.uk
#     AUTH_KEYCLOAK_ISSUER=https://<keycloak-host>/realms/<realm>
#     HEALTH_URL=https://rgq-cartones.eliasg.uk (opcional, smoke test)
#   Secrets:
#     AUTH_SECRET           (nextauth, `openssl rand -base64 32`)
#     AUTH_KEYCLOAK_ID
#     AUTH_KEYCLOAK_SECRET
#
# Pre-requisitos manuales en el VPS (una sola vez):
#   1. Network externa "proxy" creada por ~/infra-claude/vps (ya existe).
#   2. nginx config: ~/infra-claude/vps/conf.d/cartones-frontend.conf con
#      proxy_pass http://cartones_frontend:3000 y server_name rgq-cartones.eliasg.uk.
#   3. Cloudflare tunnel: agregar rgq-cartones.eliasg.uk al ingress en
#      ~/.cloudflared/config.yml + DNS CNAME en API de Cloudflare.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps-frontend-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar entorno
        run: |
          docker --version
          docker compose version
          uname -m
          docker network inspect proxy >/dev/null 2>&1 || {
            echo "::error::La network 'proxy' no existe. Crear ~/infra-claude/vps primero."
            exit 1
          }

      - name: Generar .env desde GitHub Variables/Secrets
        run: |
          umask 077
          cat > .env <<EOF
          BACKEND_INTERNAL_URL=${{ vars.BACKEND_INTERNAL_URL }}
          NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
          # NextAuth v5 lee AUTH_URL (no NEXTAUTH_URL). Fijarlo al dominio real
          # cierra el open-redirect del callbackUrl. AUTH_TRUST_HOST=true es
          # seguro porque Cloudflare + nginx-proxy sanitizan X-Forwarded-Host.
          AUTH_URL=${{ vars.NEXTAUTH_URL }}
          AUTH_TRUST_HOST=true
          AUTH_KEYCLOAK_ISSUER=${{ vars.AUTH_KEYCLOAK_ISSUER }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_KEYCLOAK_ID=${{ secrets.AUTH_KEYCLOAK_ID }}
          AUTH_KEYCLOAK_SECRET=${{ secrets.AUTH_KEYCLOAK_SECRET }}
          EOF

      - name: Deploy con docker compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build

      - name: Esperar que el frontend levante
        run: |
          for i in $(seq 1 24); do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' cartones_frontend 2>/dev/null || echo "starting")
            echo "Intento $i: cartones_frontend health=$STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Frontend no llegó a healthy en 120s"
          docker compose ps
          docker compose logs --tail=80 frontend
          exit 1

      - name: Smoke test público end-to-end
        if: vars.HEALTH_URL != ''
        run: |
          URL='${{ vars.HEALTH_URL }}'
          echo "Smoke test → $URL"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo 000)
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
              echo "Smoke test OK tras ${i} intento(s) — HTTP $CODE"
              exit 0
            fi
            echo "Intento $i — HTTP $CODE; reintento en 10s"
            sleep 10
          done
          echo "::error::Smoke test falló — última HTTP=$CODE"
          docker compose logs --tail=40 frontend
          exit 1

      - name: Purgar cache de Cloudflare
        # Cloudflare cachea el HTML 1 año (Cache Rule respeta s-maxage de Next.js).
        # Sin purge, los usuarios verían la versión vieja hasta que expire el cache.
        # Requiere secrets: CF_ZONE_ID y CF_CACHE_TOKEN (token con permission
        # "Zone:Cache Purge" sobre la zona eliasg.uk).
        if: env.CF_ZONE_ID != '' && env.CF_CACHE_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_CACHE_TOKEN: ${{ secrets.CF_CACHE_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_CACHE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"hosts":["rgq-cartones.eliasg.uk"]}')
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          if [ "$CODE" != "200" ]; then
            echo "::error::Cloudflare purge falló (HTTP $CODE): $BODY"
            exit 1
          fi
          echo "Cloudflare cache purged: $BODY"

      - name: Limpiar imágenes huérfanas
        if: always()
        run: docker image prune -f --filter "until=24h" || true
